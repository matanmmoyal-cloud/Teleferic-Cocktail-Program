<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telefèric Barcelona — Cocktail Builder</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#1a0a04 0%,#3d1c0a 50%,#1a0a04 100%);display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 60px;font-family:Georgia,serif}
  #app{max-width:480px;width:100%}
  .card{background:#faf6f0;border-radius:16px;padding:24px 20px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  /* MENU */
  .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .logo-icon{font-size:44px}
  .logo-title{font-size:28px;font-weight:bold;color:#1a0a04;letter-spacing:.05em}
  .logo-sub{font-size:11px;letter-spacing:.2em;color:#c7522a;font-family:sans-serif;font-weight:700}
  .menu-desc{color:#5c3a22;font-size:14px;line-height:1.6;margin-bottom:20px}
  .score-row{display:flex;gap:10px;margin-bottom:22px}
  .score-pill{flex:1;background:#3d1c0a;border-radius:10px;padding:10px 6px;display:flex;flex-direction:column;align-items:center}
  .score-num{color:#f5c97e;font-size:22px;font-weight:bold}
  .score-label{color:#c4a074;font-size:10px;letter-spacing:.12em;font-family:sans-serif}
  .filter-label{font-size:10px;letter-spacing:.2em;color:#c7522a;font-family:sans-serif;font-weight:700;margin-bottom:8px}
  .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
  .filter-btn{padding:9px 6px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#5c3a22;font-family:sans-serif;transition:all .15s;text-align:center}
  .filter-btn.active{background:#c7522a;border-color:#c7522a;color:#fff}
  .filter-btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{width:100%;padding:14px;background:#c7522a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:.08em;font-family:sans-serif;box-shadow:0 3px 12px rgba(199,82,42,.4);margin-bottom:10px}
  .btn-ghost{width:100%;padding:10px;background:transparent;color:#999;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;font-family:sans-serif}
  /* QUIZ HEADER */
  .quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .back-btn{background:none;border:none;color:#c7522a;cursor:pointer;font-size:13px;font-family:sans-serif;padding:0;white-space:nowrap}
  .cocktail-name{flex:1;font-size:17px;font-weight:bold;color:#1a0a04;letter-spacing:.04em}
  .cat-tag{font-size:10px;background:#c7522a;color:#fff;padding:3px 8px;border-radius:20px;font-family:sans-serif;letter-spacing:.1em;white-space:nowrap}
  /* PROGRESS */
  .progress-bar{display:flex;gap:6px;margin-bottom:16px;align-items:center}
  .progress-dot{width:10px;height:10px;border-radius:50%;transition:all .3s;flex-shrink:0}
  /* BAR COUNTER */
  .bar-counter{background:#3d1c0a;border-radius:10px;padding:10px 14px;margin-bottom:14px}
  .bar-counter-label{font-size:9px;letter-spacing:.18em;color:#c4a074;font-family:sans-serif;margin-bottom:6px}
  .bar-items{display:flex;flex-wrap:wrap;gap:6px}
  .bar-item{font-size:11px;color:#f5c97e;background:rgba(255,255,255,.08);padding:3px 8px;border-radius:20px}
  /* STEP HEADER */
  .step-label{font-size:17px;font-weight:bold;color:#1a0a04;margin-bottom:4px}
  .mixer-count{font-size:12px;color:#c7522a;font-family:sans-serif}
  .hint{font-size:12px;color:#8c6a4a;font-style:italic;margin-top:4px}
  /* TRIES */
  .tries-row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
  .try-dot{width:10px;height:10px;border-radius:50%;transition:background .2s}
  .tries-label{font-size:11px;color:#8c6a4a;font-family:sans-serif}
  /* GLASS GRID */
  .glass-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .glass-card{padding:14px 10px;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;position:relative;border:2px solid #ddd;background:#fff}
  .glass-card.correct{border-color:#2ecc71;background:#eafaf1}
  .glass-card.wrong{border-color:#e84a3c;background:#fdf0ee}
  .glass-card.reveal-correct{border-color:#2ecc71;background:#eafaf1}
  .glass-svg{height:75px;display:flex;align-items:center;justify-content:center}
  .glass-name{font-size:12px;font-weight:bold;color:#1a0a04;text-align:center}
  .glass-desc{font-size:10px;color:#8c6a4a;text-align:center}
  .badge{position:absolute;top:6px;right:10px;font-weight:bold;font-size:16px}
  /* OPTIONS LIST */
  .options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .option-btn{width:100%;padding:13px 16px;border-radius:10px;cursor:pointer;font-size:13px;text-align:left;font-family:sans-serif;border:2px solid #e8e0d8;background:#fff;color:#2c1a0e;transition:all .15s;line-height:1.4}
  .option-btn.correct{background:#eafaf1;border-color:#2ecc71}
  .option-btn.wrong{background:#fdf0ee;border-color:#e84a3c}
  .option-btn.reveal-correct{background:#eafaf1;border-color:#2ecc71}
  /* SPECIAL CARDS */
  .info-card{border-radius:14px;padding:24px 20px;margin-bottom:16px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
  .info-card.blue{background:#1a3a6e}
  .info-card.green{background:#1a3a1a}
  .info-card-icon{font-size:42px}
  .info-card-text{color:#cce0ff;font-size:15px;line-height:1.6;font-family:sans-serif}
  .info-card.green .info-card-text{color:#c0f0c0}
  /* FEEDBACK */
  .feedback-wrong{color:#e84a3c;font-size:13px;font-family:sans-serif;margin-bottom:10px}
  .feedback-revealed{color:#8c6a4a;font-size:13px;font-family:sans-serif;margin-bottom:10px;line-height:1.5}
  /* NEXT BTN */
  .btn-next{width:100%;padding:13px;background:#c7522a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:sans-serif;letter-spacing:.05em;box-shadow:0 3px 12px rgba(199,82,42,.35)}
  /* RESULT */
  .result-name{font-size:22px;font-weight:bold;color:#1a0a04;letter-spacing:.05em;margin-bottom:10px}
  .result-emoji{font-size:44px;margin-bottom:8px}
  .result-title{font-size:16px;color:#c7522a;font-family:sans-serif;font-weight:700;margin-bottom:16px}
  .result-summary{background:#3d1c0a;border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .result-row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);padding:8px 0;font-size:12px;color:#c4a074;font-family:sans-serif;flex-wrap:wrap}
  .result-val{color:#f5c97e;font-weight:bold;text-align:right;max-width:65%}
  .session-score{font-size:13px;color:#8c6a4a;font-family:sans-serif;margin-bottom:16px;text-align:center}
  .result-btns{display:flex;flex-direction:column;gap:10px}
  /* DRILL MODE */
  .drill-toggle-row{display:flex;align-items:center;justify-content:space-between;background:#1a0a04;border-radius:10px;padding:12px 16px;margin-bottom:16px}
  .drill-toggle-label{color:#f5c97e;font-family:sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em}
  .drill-toggle-sub{color:#c4a074;font-family:sans-serif;font-size:11px;margin-top:2px}
  .toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0}
  .toggle-switch input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;cursor:pointer;inset:0;background:#444;border-radius:26px;transition:.3s}
  .toggle-slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
  input:checked+.toggle-slider{background:#c7522a}
  input:checked+.toggle-slider:before{transform:translateX(22px)}
  .drill-header{display:flex;align-items:center;gap:8px;background:#c7522a;border-radius:8px;padding:6px 12px;margin-bottom:10px}
  .drill-header-icon{font-size:16px}
  .drill-header-text{color:#fff;font-family:sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em}
  .drill-lives{display:flex;gap:6px;align-items:center;margin-left:auto}
  .drill-life{font-size:16px;transition:all .2s}
  .timer-bar-wrap{height:5px;background:#e8e0d8;border-radius:3px;margin-bottom:12px;overflow:hidden}
  .timer-bar{height:100%;border-radius:3px;transition:width .1s linear;background:#c7522a}
  .timer-bar.warning{background:#e84a3c}
  .drill-countdown{display:flex;align-items:center;justify-content:center;padding:32px 0 16px}
  .drill-countdown-num{font-size:72px;font-weight:bold;color:#c7522a;font-family:Georgia,serif;animation:countPop .4s ease}
  @keyframes countPop{0%{transform:scale(1.4);opacity:.5}100%{transform:scale(1);opacity:1}}
  .drill-cocktail-reveal{text-align:center;padding:10px 0 4px;font-family:sans-serif}
  .drill-cocktail-reveal-name{font-size:20px;font-weight:bold;color:#1a0a04;letter-spacing:.05em}
  .drill-cocktail-reveal-sub{font-size:12px;color:#8c6a4a;margin-top:4px}
  .drill-fail-card{background:#fdf0ee;border:2px solid #e84a3c;border-radius:14px;padding:20px;text-align:center;margin-bottom:16px}
  .drill-fail-icon{font-size:40px;margin-bottom:8px}
  .drill-fail-title{font-size:16px;font-weight:bold;color:#e84a3c;font-family:sans-serif;margin-bottom:6px}
  .drill-fail-sub{font-size:13px;color:#8c6a4a;font-family:sans-serif}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
  .shake{animation:shake .4s ease}
  .pop{animation:pop .3s ease}

// ── Step definitions ───────────────────────────────────────────────────────────
// G&Ts have garnish injected right after ice (before mixers)
function getSteps(c) {
  const isGT = c.category === "G&Ts";
  // Method always comes right after glass (index 1)
  // Then: muddle (if any), rim (if any), ice, mixers/gtGarnish, spirit, [premix], garnish
  const base = isGT
    ? ["glass", "method", "ice", "gtGarnish", "spirit"]
    : ["glass", "method", "muddle_placeholder", "rim_placeholder", "ice", "mixers", "spirit", "garnish"];

  if (isGT) {
    const gtSteps = ["glass", "method"];
    if (c.blueIce) gtSteps.push("blueIcePaint");
    gtSteps.push("ice");
    if (c.silverDust) gtSteps.push("silverDust");
    gtSteps.push("gtGarnish");
    gtSteps.push("spirit");
    return gtSteps;
  }

  // Build dynamic step list
  const steps = ["glass", "method"];
  if (c.muddle) steps.push("muddle");
  if (c.rim) steps.push("rim");
  steps.push("ice");
  if (c.mixers && c.mixers.length > 0) steps.push("mixers");
  steps.push("spirit");
  if (c.premixComposition) steps.push("premix");
  if (c.postPremixMixers && c.postPremixMixers.length > 0) steps.push("postPremixMixers");
  if (c.garnish) steps.push("garnish");
  return steps;
}

const STEP_LABELS = {
  glass:     "🥃 Choose Your Glass",
  ice:       "🧊 What Ice Goes In?",
  blueIcePaint: "🎨 Prepare the Glass",
  silverDust: "✨ Silver Dust",
  muddle:    "🫚 Muddle First",
  rim:       "🧂 What Type of Rim?",
  gtGarnish: "🌿 Add the G&T Garnish",
  mixers:    "🧪 What Goes In Next?",
  postPremixMixers: "🧪 What Goes In After the Premix?",
  spirit:    "🍶 Add the Spirit",
  premix:    "🧬 Premix Composition",
  method:    "🔀 How Do You Make It?",
  garnish:   "🌿 Final Touch",
};

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  screen: "menu",       // menu | quiz | result | drillCountdown | drillFail
  category: "all",
  cocktail: null,
  steps: [],
  stepIndex: 0,
  mixerIndex: 0,
  tries: 0,
  selected: null,
  status: null,         // null | correct | wrong | revealed
  options: [],
  confirmed: [],
  score: {correct: 0, total: 0},
  completed: [],
  // Drill mode
  drillMode: false,
  drillLives: 2,        // wrong answers remaining this drink
  drillTimer: null,     // setInterval id
  drillTimeLeft: 4000,  // ms remaining on current question
  drillTotalTime: 4000, // ms per question
  drillCountdown: 3,    // pre-drink countdown value
  drillStreak: 0,       // current consecutive perfect drinks
  drillBestStreak: 0,   // session best streak
};

// ── Drill mode helpers ───────────────────────────────────────────────────────
function drillClearTimer() {
  if (state.drillTimer) { clearInterval(state.drillTimer); state.drillTimer = null; }
}

function drillStartTimer() {
  drillClearTimer();
  if (!state.drillMode || isSingleConfirm() || state.status !== null) return;
  state.drillTimeLeft = state.drillTotalTime;
  state.drillTimer = setInterval(() => {
    state.drillTimeLeft -= 100;
    // Update timer bar only (no full re-render for performance)
    const bar = document.getElementById("drill-timer-bar");
    if (bar) {
      const pct = Math.max(0, state.drillTimeLeft / state.drillTotalTime * 100);
      bar.style.width = pct + "%";
      if (pct < 30) bar.classList.add("warning"); else bar.classList.remove("warning");
    }
    if (state.drillTimeLeft <= 0) {
      drillClearTimer();
      drillTimeUp();
    }
  }, 100);
}

function drillTimeUp() {
  // Count as wrong answer
  state.drillLives--;
  state.score.total++;
  state.status = "revealed";
  if (state.drillLives <= 0) {
    // Fail — restart this drink after showing answer briefly
    render();
    setTimeout(() => {
      state.screen = "drillFail";
      render();
    }, 1800);
  } else {
    render();
    // Auto-advance after showing answer
    setTimeout(() => {
      if (state.status === "revealed") {
        advanceStep();
        drillStartTimer();
      }
    }, 1800);
  }
}

function drillStartCountdown(cocktailName) {
  state.screen = "drillCountdown";
  state.drillCountdown = 3;
  render();
  const tick = setInterval(() => {
    state.drillCountdown--;
    if (state.drillCountdown <= 0) {
      clearInterval(tick);
      state.screen = "quiz";
      render();
      drillStartTimer();
    } else {
      render();
    }
  }, 1000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getFiltered() {
  if (state.category === "all") return COCKTAILS;
  return COCKTAILS.filter(c => c.category === state.category);
}

function currentAnswer() {
  const c = state.cocktail;
  const step = state.steps[state.stepIndex];
  if (step === "glass") return c.glass;
  if (step === "blueIcePaint") return "Paint the inside of the glass with blue edible paint";
  if (step === "silverDust") return "Silver Dust";
  if (step === "muddle") return c.muddle;
  if (step === "rim") return c.rim;
  if (step === "ice") return c.ice;
  if (step === "gtGarnish") return c.garnish;
  if (step === "mixers") return c.mixers[state.mixerIndex];
  if (step === "postPremixMixers") return c.postPremixMixers[state.mixerIndex];
  if (step === "spirit") return c.spirit;
  if (step === "premix") return c.premixComposition;
  if (step === "method") return c.method;
  if (step === "garnish") return c.garnish;
  return "";
}

function buildOptions() {
  const c = state.cocktail;
  const step = state.steps[state.stepIndex];
  let opts = [];
  if (step === "glass") {
    opts = shuffle(c.glassOptions);
  } else if (step === "blueIcePaint") {
    opts = ["Paint the inside of the glass with blue edible paint"];
  } else if (step === "muddle") {
    opts = shuffle(c.muddleOptions);
  } else if (step === "rim") {
    opts = shuffle(c.rimOptions);
  } else if (step === "ice") {
    opts = shuffle(c.iceOptions);
  } else if (step === "gtGarnish") {
    opts = shuffle(c.garnishOptions);
  } else if (step === "postPremixMixers") {
    const ans = c.postPremixMixers[state.mixerIndex];
    const allMixers = new Set([...(c.mixers||[]), ...(c.postPremixMixers||[])]);
    const noz = !/oz|dash/i.test(ans);
    let pool = COCKTAILS.filter(x => x.id !== c.id).flatMap(x => [...(x.mixers||[]), ...(x.postPremixMixers||[])]).filter(m => m !== ans && !allMixers.has(m));
    pool = noz ? pool.filter(m => !/oz|dash/i.test(m) && !/espresso|bitters|tonic|soda|sprite/i.test(m)) : pool.filter(m => /oz|dash|tonic|soda|sprite|espresso|purée|puree|custard|bitters|leaves|wedges/i.test(m));
    opts = shuffle([ans, ...shuffle([...new Set(pool)]).slice(0,3)]);
  } else if (step === "mixers") {
    const ans = c.mixers[state.mixerIndex];
    const allCocktailMixers = new Set(c.mixers); // exclude ALL of this cocktail's mixers as distractors
    const noz = !/oz|dash/i.test(ans);
    let pool = COCKTAILS.filter(x => x.id !== c.id).flatMap(x => x.mixers).filter(m => m !== ans && !allCocktailMixers.has(m));
    pool = noz ? pool.filter(m => !/oz|dash/i.test(m)) : pool.filter(m => /oz|dash|tonic|soda|sprite|espresso|purée|puree|custard|bitters|leaves|wedges/i.test(m));
    opts = shuffle([ans, ...shuffle([...new Set(pool)]).slice(0,3)]);
  } else if (step === "spirit") {
    if (c.spirit.startsWith("No spirit")) { opts = ["No spirit — zero proof"]; }
    else { opts = shuffle(c.spiritOptions); }
  } else if (step === "premix") {
    opts = shuffle(c.premixOptions);
  } else if (step === "method") {
    opts = shuffle(c.methodOptions);
  } else if (step === "garnish") {
    opts = shuffle(c.garnishOptions);
  }
  state.options = opts;
}

function startQuiz() {
  drillClearTimer();
  const pool = getFiltered().filter(c => !state.completed.includes(c.id));
  const src = pool.length > 0 ? pool : getFiltered();
  const c = src[Math.floor(Math.random() * src.length)];
  state.cocktail = c;
  state.steps = getSteps(c);
  state.stepIndex = 0;
  state.mixerIndex = 0;
  state.tries = 0;
  state.selected = null;
  state.status = null;
  state.confirmed = [];
  state.drillLives = 2;
  buildOptions();
  if (state.drillMode) {
    drillStartCountdown(c.name);
  } else {
    state.screen = "quiz";
    render();
  }
}

function isSingleConfirm() {
  const step = state.steps[state.stepIndex];
  const c = state.cocktail;
  return step === "blueIcePaint"
    || step === "silverDust"
    || (step === "spirit" && c.spirit.startsWith("No spirit"))
    || (step === "garnish" && c.garnishConfirm);
}

function handleGotIt() {
  const step = state.steps[state.stepIndex];
  const label = step === "blueIcePaint" ? "Blue edible paint applied"
    : step === "silverDust" ? "Silver Dust added"
    : step === "garnish" ? currentAnswer()
    : "No spirit — zero proof";
  const icon = step === "blueIcePaint" ? "🎨"
    : step === "silverDust" ? "✨"
    : step === "garnish" ? "🌿"
    : "🚫🍶";
  state.confirmed.push({type: step, value: label, icon});
  advanceStep();
}

function advanceStep() {
  const step = state.steps[state.stepIndex];
  // If mixers and more remain
  if ((step === "mixers" && state.mixerIndex < state.cocktail.mixers.length - 1) ||
      (step === "postPremixMixers" && state.mixerIndex < (state.cocktail.postPremixMixers||[]).length - 1)) {
    state.confirmed.push({type:"mixer", value: currentAnswer(), icon:"🧪"});
    state.mixerIndex++;
    state.tries = 0; state.selected = null; state.status = null;
    buildOptions(); render(); return;
  }
  // Record confirmed (blueIcePaint already logged by handleGotIt — skip)
  const icons = {glass:"🥃",blueIcePaint:"🎨",silverDust:"✨",muddle:"🫚",rim:"🧂",ice:"🧊",gtGarnish:"🌿",mixer:"🧪",mixers:"🧪",postPremixMixers:"🧪",spirit:"🍶",premix:"🧬",method:"🔀",garnish:"🌿"};
  if (step !== "blueIcePaint") {
    state.confirmed.push({type: step, value: currentAnswer(), icon: icons[step]||"✅"});
  }
  state.stepIndex++;
  if (state.stepIndex >= state.steps.length) {
    state.completed.push(state.cocktail.id);
    if (state.drillMode) {
      state.drillStreak++;
      if (state.drillStreak > state.drillBestStreak) state.drillBestStreak = state.drillStreak;
      // Auto-start next drink after brief result flash
      state.screen = "result"; render();
      setTimeout(() => startQuiz(), 2500);
    } else {
      state.screen = "result"; render();
    }
    return;
  }
  state.mixerIndex = 0; state.tries = 0; state.selected = null; state.status = null;
  buildOptions(); render();
  if (state.drillMode && state.screen === "quiz") drillStartTimer();
}

function handleSelect(opt) {
  if (state.status === "correct" || state.status === "revealed") return;
  state.selected = opt;
  const ans = currentAnswer();
  if (opt === ans) {
    drillClearTimer();
    state.status = "correct";
    state.score.correct++; state.score.total++;
    render();
    if (state.drillMode) {
      // Auto-advance after brief correct flash
      setTimeout(() => {
        if (state.status === "correct") {
          advanceStep();
          drillStartTimer();
        }
      }, 600);
    }
    return;
  }
  // Wrong answer
  if (state.drillMode) {
    drillClearTimer();
    state.drillLives--;
    state.score.total++;
    state.status = state.drillLives <= 0 ? "revealed" : "wrong";
    render();
    if (state.drillLives <= 0) {
      state.drillStreak = 0;
      setTimeout(() => { state.screen = "drillFail"; render(); }, 1800);
    } else {
      setTimeout(() => {
        const el = document.getElementById("options-list");
        if (el) el.classList.add("shake");
        setTimeout(() => {
          el && el.classList.remove("shake");
          state.status = null; state.selected = null;
          render();
          drillStartTimer();
        }, 500);
      }, 10);
    }
    return;
  }
  // Normal mode
  state.tries++;
  state.score.total++;
  if (state.tries >= 2) {
    state.status = "revealed";
    render();
    setTimeout(() => {
      const el = document.getElementById("options-list");
      if (el) el.classList.add("shake");
      setTimeout(() => el && el.classList.remove("shake"), 500);
    }, 10);
  } else {
    state.status = "wrong";
    render();
    setTimeout(() => {
      const el = document.getElementById("options-list");
      if (el) el.classList.add("shake");
      setTimeout(() => {
        el && el.classList.remove("shake");
        state.status = null; state.selected = null;
        render();
      }, 500);
    }, 10);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.screen === "menu") { app.innerHTML = renderMenu(); }
  else if (state.screen === "quiz") { app.innerHTML = renderQuiz(); }
  else if (state.screen === "drillCountdown") { app.innerHTML = renderDrillCountdown(); }
  else if (state.screen === "drillFail") { app.innerHTML = renderDrillFail(); }
  else { app.innerHTML = renderResult(); }
  attachEvents();
}

function renderMenu() {
  const total = COCKTAILS.length;
  const cats = ["Classic Cocktails","G&Ts","Lower Proof","Telefèric Classics","Seasonal Cocktails","Zero Proof"];
  const catBtns = [["all",`All (${total})`], ...cats.map(c => [c, c+` (${COCKTAILS.filter(x=>x.category===c).length})`])]
    .map(([val,label]) => {
      const active = state.category === val ? "active" : "";
      return `<button class="filter-btn ${active}" data-cat="${val}">${label}</button>`;
    }).join("");
  return `<div class="card">
    <div class="logo-row"><div class="logo-icon">🍸</div><div><div class="logo-title">telefèric</div><div class="logo-sub">COCKTAIL BUILDER</div></div></div>
    <p class="menu-desc">Build each cocktail step by step — glass, ice, mixers, spirit, method, garnish. 2 tries per question.</p>
    <div class="score-row">
      <div class="score-pill"><span class="score-num">${state.score.correct}</span><span class="score-label">CORRECT</span></div>
      <div class="score-pill"><span class="score-num">${state.score.total}</span><span class="score-label">ANSWERED</span></div>
      <div class="score-pill"><span class="score-num">${state.completed.length}</span><span class="score-label">DONE</span></div>
      ${state.drillBestStreak > 0 ? `<div class="score-pill"><span class="score-num">🔥${state.drillBestStreak}</span><span class="score-label">BEST STREAK</span></div>` : ""}
    </div>
    <div class="filter-label">CATEGORY</div>
    <div class="filter-grid">${catBtns}</div>
    <div class="drill-toggle-row">
      <div><div class="drill-toggle-label">⚡ DRILL MODE</div><div class="drill-toggle-sub">4 sec per question · 2 wrong = restart</div></div>
      <label class="toggle-switch"><input type="checkbox" id="drill-toggle" ${state.drillMode?"checked":""}><span class="toggle-slider"></span></label>
    </div>
    <button class="btn-primary" id="start-btn">${state.drillMode ? "⚡ START DRILL →" : "BUILD A COCKTAIL →"}</button>
    ${state.completed.length > 0 ? `<button class="btn-ghost" id="reset-btn">Reset Progress</button>` : ""}
  </div>`;
}

function renderQuiz() {
  const c = state.cocktail;
  const steps = state.steps;
  const si = state.stepIndex;
  const step = steps[si];
  const ans = currentAnswer();

  // Progress dots
  const dots = steps.map((s,i) => {
    const bg = i < si ? "#c7522a" : i === si ? "#e8764a" : "#ddd";
    const scale = i === si ? "transform:scale(1.3)" : "";
    return `<div class="progress-dot" style="background:${bg};${scale}"></div>`;
  }).join("");

  // Confirmed bar
  let barHTML = "";
  if (state.confirmed.length > 0) {
    const items = state.confirmed.map(it => {
      const val = it.type === "premix"
        ? it.value.split(" + ").slice(0,2).join(" + ") + (it.value.split(" + ").length > 2 ? "…" : "")
        : it.value;
      return `<span class="bar-item">${it.icon} ${val}</span>`;
    }).join("");
    barHTML = `<div class="bar-counter"><div class="bar-counter-label">IN THE GLASS SO FAR</div><div class="bar-items">${items}</div></div>`;
  }

  // Step label
  let stepLabel = STEP_LABELS[step] || step;
  if (step === "premix") stepLabel = `🧬 What's in the ${c.spirit.replace(/^[\d½¾¼.x ]+ oz /i,"").replace(/^[\d.]+ oz /i,"")}?`;
  if (step === "gtGarnish") stepLabel = "🌿 Add the G&T Garnish";
  if (step === "ice" && c.blueIce) stepLabel = "🧊 After painting the glass, what ice goes in?";

  // Sub-label
  let subLabel = "";
  const totalMixers = c.mixers ? c.mixers.length : 0;
  if (step === "mixers" && totalMixers > 1) subLabel += `<div class="mixer-count">Mixer ${state.mixerIndex+1} of ${totalMixers}</div>`;
  if (step === "mixers" && c.mixerHints) subLabel += `<div class="hint">Hint: ${c.mixerHints[state.mixerIndex]}</div>`;
  if (step === "postPremixMixers" && c.postPremixMixerHints) subLabel += `<div class="hint">Hint: ${c.postPremixMixerHints[state.mixerIndex]}</div>`;

  // Tries row
  const triesHTML = !isSingleConfirm() && (state.status === null || state.status === "wrong")
    ? `<div class="tries-row">
        <div class="try-dot" style="background:${state.tries>0?"#e84a3c":"#ddd"}"></div>
        <div class="try-dot" style="background:${state.tries>1?"#e84a3c":"#ddd"}"></div>
        <span class="tries-label">${state.tries===0?"2 tries remaining":"1 try remaining"}</span>
      </div>`
    : "";

  // Main content area
  let mainHTML = "";
  if (isSingleConfirm()) {
    let cls = "green", icon2 = "🚫🍶", msg = "No spirit — this is a <strong>zero proof</strong> drink";
    if (step === "blueIcePaint") { cls = "blue"; icon2 = "🎨"; msg = "Paint the inside of the glass with <strong>blue edible paint</strong>"; }
    else if (step === "silverDust") { cls = "blue"; icon2 = "✨"; msg = "Add a pinch of <strong>Silver Dust</strong> to the glass"; }
    else if (step === "garnish" && c.garnishConfirm) {
      cls = "blue"; icon2 = "🌿";
      msg = `Final touch — <strong>${currentAnswer()}</strong>`;
    }
    mainHTML = `<div class="info-card ${cls}"><div class="info-card-icon">${icon2}</div><div class="info-card-text">${msg}</div><button class="btn-next" id="got-it-btn">Got it →</button></div>`;
  } else if (step === "glass") {
    const cards = state.options.map(opt => {
      const gi = getGlass(opt);
      let cls = "";
      if (state.status === "correct" && opt === state.selected) cls = "correct";
      else if ((state.status === "wrong" || state.status === "revealed") && opt === state.selected && opt !== ans) cls = "wrong";
      else if (state.status === "revealed" && opt === ans) cls = "reveal-correct";
      const badge = (state.status === "correct" && opt === state.selected) || (state.status === "revealed" && opt === ans) ? `<div class="badge" style="color:#2ecc71">✓</div>` :
        (state.status !== "correct" && opt === state.selected && opt !== ans) ? `<div class="badge" style="color:#e84a3c">✗</div>` : "";
      return `<button class="glass-card ${cls}" data-opt="${opt.replace(/"/g,"&quot;")}">
        <div class="glass-svg">${gi.svg}</div>
        <div class="glass-name">${opt}</div>
        <div class="glass-desc">${gi.desc}</div>
        ${badge}
      </button>`;
    }).join("");
    mainHTML = `<div class="glass-grid">${cards}</div>`;
  } else {
    const btns = state.options.map(opt => {
      let cls = "";
      const isSel = opt === state.selected;
      const isAns = opt === ans;
      if (state.status === "correct" && isSel) cls = "correct";
      else if ((state.status === "wrong" || state.status === "revealed") && isSel && !isAns) cls = "wrong";
      else if (state.status === "revealed" && isAns) cls = "reveal-correct";
      const tick = (state.status === "correct" && isSel) || (state.status === "revealed" && isAns) ? " ✓" : "";
      const cross = (state.status !== null) && isSel && !isAns && state.status !== "correct" ? " ✗" : "";
      return `<button class="option-btn ${cls}" data-opt="${opt.replace(/"/g,"&quot;").replace(/'/g,"&#39;")}">${opt}${tick}${cross}</button>`;
    }).join("");
    mainHTML = `<div class="options-list" id="options-list">${btns}</div>`;
  }

  // Feedback
  let feedbackHTML = "";
  if (state.status === "wrong" && state.tries < 2) feedbackHTML = `<div class="feedback-wrong">Not quite — try again! (1 left)</div>`;
  if (state.status === "revealed") feedbackHTML = `<div class="feedback-revealed">The answer was: <strong>${ans}</strong></div>`;

  // Next button
  let nextHTML = "";
  if (!isSingleConfirm() && (state.status === "correct" || state.status === "revealed")) {
    if (state.drillMode) {
      // In drill mode auto-advances — just show feedback, no button
    } else {
      const isLast = si === steps.length - 1;
      const isMoreMixers = step === "mixers" && state.mixerIndex < totalMixers - 1;
      const label = isLast ? "Finish 🏁" : isMoreMixers ? `Next Mixer (${state.mixerIndex+2}/${totalMixers}) →` : "Next Step →";
      nextHTML = `<button class="btn-next" id="next-btn">${label}</button>`;
    }
  }

  // Drill overlay elements
  const drillHeaderHTML = state.drillMode ? `
    <div class="drill-header">
      <span class="drill-header-icon">⚡</span>
      <span class="drill-header-text">DRILL</span>
      ${state.drillStreak > 0 ? `<span style="color:#f5c97e;font-family:sans-serif;font-size:12px;margin-left:4px">🔥 ${state.drillStreak}</span>` : ""}
      ${state.drillBestStreak > 0 ? `<span style="color:#c4a074;font-family:sans-serif;font-size:10px;margin-left:2px">best ${state.drillBestStreak}</span>` : ""}
      <div class="drill-lives">
        <span class="drill-life" style="opacity:${state.drillLives>=1?1:.2}">❤️</span>
        <span class="drill-life" style="opacity:${state.drillLives>=2?1:.2}">❤️</span>
      </div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="drill-timer-bar" style="width:${state.drillTimeLeft/state.drillTotalTime*100}%"></div></div>
  ` : "";

  return `<div class="card">
    ${drillHeaderHTML}
    <div class="quiz-header">
      <button class="back-btn" id="back-btn">← Menu</button>
      <div class="cocktail-name">${c.name}</div>
      <div class="cat-tag">${c.category}</div>
    </div>
    <div class="progress-bar">${dots}</div>
    ${barHTML}
    <div style="margin-bottom:14px">
      <div class="step-label">${stepLabel}</div>
      ${subLabel}
    </div>
    ${triesHTML}
    ${mainHTML}
    ${feedbackHTML}
    ${nextHTML}
  </div>`;
}

function renderResult() {
  const c = state.cocktail;
  const pct = state.score.total > 0 ? Math.round(state.score.correct/state.score.total*100) : 0;
  let rows = [
    ["Glass", c.glass],
    c.muddle ? ["Muddle", c.muddle] : null,
    c.rim ? ["Rim", c.rim] : null,
    ["Ice", c.ice],
    c.category === "G&Ts" ? ["Garnish (after ice)", c.garnish] : null,
    ["Mixers", c.mixers ? c.mixers.join(", ") : "—"],
    ["Spirit", c.spirit],
    c.premixComposition ? ["Premix", c.premixComposition] : null,
    ["Method", c.method],
    c.category !== "G&Ts" ? ["Garnish", c.garnish] : null,
  ].filter(Boolean).map(([k,v]) =>
    `<div class="result-row"><span>${k}</span><span class="result-val">${v}</span></div>`
  ).join("");
  return `<div class="card">
    <div class="result-name">${c.name}</div>
    <div class="result-emoji">✅</div>
    <div class="result-title">${state.drillMode ? `🔥 Streak: ${state.drillStreak} · Best: ${state.drillBestStreak}` : "Cocktail Complete!"}</div>
    <div class="result-summary">${rows}</div>
    <div class="session-score">Session: ${state.score.correct}/${state.score.total} correct (${pct}%)</div>
    <div class="result-btns">
      ${state.drillMode
        ? `<div style="text-align:center;color:#8c6a4a;font-family:sans-serif;font-size:13px;padding:8px 0">Next drink starting in 2.5 seconds…</div>`
        : `<button class="btn-primary" id="next-cocktail-btn">Next Cocktail →</button>`}
      <button class="btn-ghost" id="menu-btn">Back to Menu</button>
    </div>
  </div>`;
}

function renderDrillCountdown() {
  const streakHTML = state.drillStreak > 0
    ? `<div style="background:#3d1c0a;border-radius:8px;padding:6px 14px;display:inline-block;margin-bottom:16px">
        <span style="color:#f5c97e;font-family:sans-serif;font-size:13px;font-weight:700">🔥 ${state.drillStreak} streak</span>
        ${state.drillBestStreak > state.drillStreak ? `<span style="color:#c4a074;font-family:sans-serif;font-size:11px;margin-left:6px">best: ${state.drillBestStreak}</span>` : ""}
      </div>`
    : "";
  return `<div class="card" style="text-align:center;padding:40px 20px">
    <div style="font-size:11px;letter-spacing:.2em;color:#c7522a;font-family:sans-serif;font-weight:700;margin-bottom:12px">⚡ DRILL MODE</div>
    ${streakHTML}
    <div class="drill-cocktail-reveal">
      <div class="drill-cocktail-reveal-name">${state.cocktail.name}</div>
      <div class="drill-cocktail-reveal-sub">${state.cocktail.category}</div>
    </div>
    <div class="drill-countdown"><div class="drill-countdown-num">${state.drillCountdown}</div></div>
    <div style="color:#8c6a4a;font-family:sans-serif;font-size:13px">Get ready — 4 seconds per question</div>
    <div class="drill-lives" style="justify-content:center;margin-top:16px">
      <span style="font-size:20px">❤️</span><span style="font-size:20px">❤️</span>
    </div>
  </div>`;
}

function renderDrillFail() {
  const newBest = state.drillStreak === 0 && state.drillBestStreak > 0;
  return `<div class="card">
    <div class="drill-fail-card">
      <div class="drill-fail-icon">💀</div>
      <div class="drill-fail-title">DRILL OVER</div>
      <div class="drill-fail-sub">2 incorrect on <strong>${state.cocktail.name}</strong>.<br>Streak reset.</div>
    </div>
    ${state.drillBestStreak > 0 ? `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:11px;letter-spacing:.15em;color:#8c6a4a;font-family:sans-serif;margin-bottom:4px">BEST STREAK THIS SESSION</div>
      <div style="font-size:36px;font-weight:bold;color:#c7522a;font-family:Georgia,serif">🔥 ${state.drillBestStreak}</div>
    </div>` : ""}
    <button class="btn-primary" id="retry-btn">⚡ Start New Drill →</button>
    <button class="btn-ghost" id="menu-btn">Back to Menu</button>
  </div>`;
}

function attachEvents() {
  const q = id => document.getElementById(id);
  const $ = (sel) => document.querySelectorAll(sel);

  q("start-btn") && q("start-btn").addEventListener("click", startQuiz);
  q("reset-btn") && q("reset-btn").addEventListener("click", () => { state.completed = []; state.score = {correct:0,total:0}; render(); });
  q("back-btn") && q("back-btn").addEventListener("click", () => { state.screen = "menu"; render(); });
  q("next-btn") && q("next-btn").addEventListener("click", advanceStep);
  q("got-it-btn") && q("got-it-btn").addEventListener("click", handleGotIt);
  q("next-cocktail-btn") && q("next-cocktail-btn").addEventListener("click", startQuiz);
  q("menu-btn") && q("menu-btn").addEventListener("click", () => { state.screen = "menu"; render(); });

  $(".filter-btn").forEach(btn => btn.addEventListener("click", () => {
    state.category = btn.dataset.cat; render();
  }));
  $(".glass-card").forEach(btn => btn.addEventListener("click", () => handleSelect(btn.dataset.opt)));
  $(".option-btn").forEach(btn => btn.addEventListener("click", () => handleSelect(btn.dataset.opt)));

  const drillToggle = document.getElementById("drill-toggle");
  if (drillToggle) drillToggle.addEventListener("change", () => { state.drillMode = drillToggle.checked; render(); });
  q("retry-btn") && q("retry-btn").addEventListener("click", () => startQuiz());
}

render();
</script>
</body>
</html>
